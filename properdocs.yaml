site_name: ai-rizz
site_description: >-
  AI-powered manager for Cursor rules, commands, skills, and rulesets.
  One-command add/remove/sync with progressive manifest system and
  environment-variable fallbacks.
site_url: https://texarkanine.github.io/ai-rizz/
site_author: Texarkanine

repo_url: https://github.com/Texarkanine/ai-rizz
repo_name: Texarkanine/ai-rizz
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

# Strict mode = warnings become errors. Combined with the explicit `validation:` block
# below, this is the integrity gate for the tightly cross-linked docs/ tree.
strict: true

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

theme:
  name: material
  language: en
  features:
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - awesome-pages
  - panzoom

markdown_extensions:
  # Core structure / typography
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
      permalink_title: Permanent link to this section
      # GitHub-compatible slugifier so docs/ markdown renders identically on
      # github.com and the mkdocs site. Existing cross-links were authored
      # against GitHub's slug rules (e.g. "a / b" → "a--b"); this preserves them.
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
      auto_append: []
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Texarkanine/ai-rizz
  generator: false
